<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="DetectiveML" />
    <meta name="description" content="AI-powered detective mystery game" />
    <title>DetectiveML</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://esm.sh/atropos@2.0.2/atropos.css" />
    <style>
      html {
        background-color: #000;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #000;
        color: #eee;
        font-family: 'VT323', monospace;
        overflow: hidden; /* Prevent scroll for the full-screen app */
      }
      * {
        box-sizing: border-box;
      }
      /* Matches Layout MainContainer padding until GlobalStyle loads (2 * 8px space) */
      :root {
        --toast-crt-inset: 16px;
      }
      @media (max-width: 768px) {
        :root {
          --toast-crt-inset: 0px;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react": "https://esm.sh/react@^19.2.3",
    "three": "https://esm.sh/three@^0.182.0",
    "styled-components": "https://esm.sh/styled-components@^6.1.19",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "atropos/react": "https://esm.sh/atropos@2.0.2/react",
    "atropos/": "https://esm.sh/atropos@^2.0.2/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <script>
      (function () {
        var dedupe = Object.create(null);
        function remove(el) {
          var id = el.getAttribute('data-toast-dedupe');
          if (id) delete dedupe[id];
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }
        window.__showDetectiveToast = function (variant, text, opts) {
          opts = opts || {};
          var duration =
            opts.duration != null ? Number(opts.duration) : variant === 'error' ? 6500 : 4000;
          var dedupeId = opts.id;
          var stackStyle =
            'position:absolute;bottom:calc(var(--toast-crt-inset, 0px) + var(--screen-edge-bottom, 30px) + 12px);right:calc(var(--toast-crt-inset, 0px) + var(--screen-edge-horizontal, 80px));left:auto;top:auto;max-width:min(96vw,420px);display:flex;flex-direction:column-reverse;gap:8px;align-items:flex-end;pointer-events:none';
          var mount = document.getElementById('detective-ml-toast-mount');
          var parent = mount || document.body;
          var hostStyle =
            parent === document.body
              ? 'position:fixed;inset:0;pointer-events:none;z-index:9998'
              : 'position:absolute;inset:0;pointer-events:none;z-index:0';
          var stack = document.getElementById('detective-ml-toast-stack');
          if (!stack) {
            var host = document.createElement('div');
            host.id = 'detective-ml-toast-host';
            host.setAttribute('aria-live', 'polite');
            host.style.cssText = hostStyle;
            stack = document.createElement('div');
            stack.id = 'detective-ml-toast-stack';
            stack.style.cssText = stackStyle;
            host.appendChild(stack);
            parent.appendChild(host);
          } else {
            stack.style.cssText = stackStyle;
            var h = document.getElementById('detective-ml-toast-host');
            if (h && mount && h.parentNode !== mount) {
              h.style.cssText = hostStyle;
              mount.appendChild(h);
            }
          }
          if (dedupeId && dedupe[dedupeId]) {
            try {
              remove(dedupe[dedupeId]);
            } catch (e) {}
          }
          var div = document.createElement('div');
          div.setAttribute('role', 'status');
          div.textContent = String(text);
          if (dedupeId) {
            div.setAttribute('data-toast-dedupe', dedupeId);
            dedupe[dedupeId] = div;
          }
          var bg = '#1a1a1a';
          var borderW = variant === 'error' ? '3px solid #ff2222' : '1px solid #555555';
          var color =
            variant === 'error' ? '#ff8888' : variant === 'success' ? '#66ff99' : '#eeeeee';
          div.style.cssText =
            'pointer-events:auto;max-width:420px;padding:12px 16px;font-family:VT323,ui-monospace,monospace;font-size:20px;line-height:1.35;white-space:pre-wrap;word-break:break-word;background:' +
            bg +
            ';color:' +
            color +
            ';border:' +
            borderW +
            ';box-shadow:0 4px 24px rgba(0,0,0,0.65)';
          stack.appendChild(div);
          var hostEl = document.getElementById('detective-ml-toast-host');
          if (hostEl && hostEl.parentNode) {
            hostEl.parentNode.appendChild(hostEl);
          }
          setTimeout(function () {
            if (div.parentNode) remove(div);
          }, duration);
        };
      })();
    </script>
    <!-- Dev-only: confirms toast host + positioning before React bundle runs -->
    <script type="module">
      if (import.meta.env.DEV) {
        window.__showDetectiveToast?.('success', 'DEV: Toast OK', { duration: 5000 });
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
